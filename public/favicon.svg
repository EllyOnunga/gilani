<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Dark background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <!-- Neon blue book -->
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <!-- Orange neural network -->
    <linearGradient id="orange" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Open book (neon blue outline) -->
  <!-- Left page -->
  <path d="M 18 90 Q 32 72 64 78 L 64 38 Q 32 30 18 50 Z"
        fill="none" stroke="url(#blue)" stroke-width="2.2"
        stroke-linejoin="round" filter="url(#glow-blue)"/>
  <!-- Right page -->
  <path d="M 110 90 Q 96 72 64 78 L 64 38 Q 96 30 110 50 Z"
        fill="none" stroke="url(#blue)" stroke-width="2.2"
        stroke-linejoin="round" filter="url(#glow-blue)"/>
  <!-- Book spine / bottom curve -->
  <path d="M 18 90 Q 64 98 110 90" fill="none" stroke="url(#blue)" stroke-width="2.2" filter="url(#glow-blue)"/>

  <!-- Neural network nodes & connections (orange) -->
  <!-- Connections first (behind nodes) -->
  <g stroke="url(#orange)" stroke-width="1.1" opacity="0.85" filter="url(#glow-orange)">
    <line x1="64" y1="28" x2="40" y2="52"/>
    <line x1="64" y1="28" x2="88" y2="52"/>
    <line x1="40" y1="52" x2="64" y2="68"/>
    <line x1="88" y1="52" x2="64" y2="68"/>
    <line x1="40" y1="52" x2="26" y2="64"/>
    <line x1="88" y1="52" x2="102" y2="64"/>
    <line x1="26" y1="64" x2="40" y2="78"/>
    <line x1="102" y1="64" x2="88" y2="78"/>
    <line x1="40" y1="78" x2="64" y2="68"/>
    <line x1="88" y1="78" x2="64" y2="68"/>
    <line x1="40" y1="52" x2="88" y2="52"/>
  </g>

  <!-- Nodes -->
  <g fill="url(#orange)" filter="url(#glow-orange)">
    <!-- Top center (sparkle star) -->
    <path d="M64 22 L65.5 27 L70 28 L65.5 29 L64 34 L62.5 29 L58 28 L62.5 27 Z" fill="#fbbf24"/>
    <!-- Main nodes -->
    <circle cx="64" cy="28" r="3"/>
    <circle cx="40" cy="52" r="2.5"/>
    <circle cx="88" cy="52" r="2.5"/>
    <circle cx="64" cy="68" r="3"/>
    <circle cx="26" cy="64" r="2"/>
    <circle cx="102" cy="64" r="2"/>
    <circle cx="40" cy="78" r="2"/>
    <circle cx="88" cy="78" r="2"/>
  </g>
</svg>
