<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Scholarly Hearth Warmth -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="hsl(24, 25%, 15%)" />
      <stop offset="100%" stop-color="hsl(24, 20%, 8%)" />
    </radialGradient>

    <!-- Terracotta Flame Gradient -->
    <linearGradient id="terracotta-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(22, 75%, 48%)" />
      <stop offset="100%" stop-color="hsl(45, 95%, 60%)" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="128" height="128" rx="32" fill="url(#bg-grad)" stroke="hsl(22, 75%, 48%, 0.3)" stroke-width="2" />

  <g transform="translate(16, 16)">
    <!-- Book pages -->
    <path d="M 5 90 Q 25 80 48 95 Q 48 35 48 25 Q 25 10 5 20 Z" fill="hsl(38, 20%, 90%)" />
    <path d="M 91 90 Q 71 80 48 95 Q 48 35 48 25 Q 71 10 91 20 Z" fill="hsl(38, 20%, 94%)" />
    <path d="M 45 25 L 51 25 L 51 96 L 45 96 Z" fill="hsl(24, 20%, 25%)" />

    <!-- Socratic Hearth / Flame -->
    <path d="M 48 20 C 30 42 32 62 48 75 C 64 62 66 42 48 20 Z" fill="url(#terracotta-grad)" />
    <path d="M 48 32 C 37 50 39 62 48 71 C 57 62 59 50 48 32 Z" fill="url(#gold-grad)" />
    
    <!-- Little sparkle -->
    <path d="M 76 20 L 78 22 L 76 24 L 74 22 Z" fill="#FBBF24" />
  </g>
</svg>
